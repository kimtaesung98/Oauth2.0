<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Chat</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="chat-container">

    <!-- 사이드바: 채팅 목록 -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <span id="my-name"></span>
        <button id="logout-btn">로그아웃</button>
      </div>
      <ul id="chat-list"></ul>
    </aside>

    <!-- 메인: 메시지 영역 -->
    <main class="chat-main">
      <div class="chat-header" id="chat-header">대화 상대를 선택하세요</div>
      <div class="messages" id="messages"></div>
      <div class="input-area">
        <input type="text" id="msg-input" placeholder="메시지 입력..." disabled />
        <button id="send-btn" disabled>전송</button>
      </div>
    </main>

  </div>

  <script type="module">
    import { connectWS, sendMessage, loadChatList, loadMessages } from './js/chat.js';
    import { getToken, getUser, clearAuth, setToken } from './js/api.js';

    const urlParams = new URLSearchParams(window.location.search);
    const tokenFromUrl = urlParams.get('token');
    if (tokenFromUrl) {
      setToken(tokenFromUrl);
      window.history.replaceState({}, '', '/chat.html');
    }

    // 비로그인 → 로그인 화면으로
    if (!getToken()) window.location.href = '/index.html';

    const me = getUser();
    document.getElementById('my-name').textContent = me?.name || '';

    // WebSocket 연결
    connectWS((msg) => {
      // 현재 열린 대화창의 메시지만 렌더링
      if (msg.senderId === currentPartnerId || msg.receiverId === currentPartnerId) {
        appendMessage(msg);
      }
    });

    // 채팅 목록 로드
    let currentPartnerId = null;

    async function renderChatList() {
      const chats = await loadChatList();
      const list  = document.getElementById('chat-list');
      list.innerHTML = '';
      chats.forEach(chat => {
        const li = document.createElement('li');
        li.className = 'user-item';
        li.dataset.uid = chat.partnerId;
        li.innerHTML = `
          <span class="dot offline"></span>
          <div>
            <strong>${chat.partnerName}</strong>
            <p>${chat.lastMessage}</p>
          </div>
          ${chat.unreadCount > 0 ? `<span class="badge">${chat.unreadCount}</span>` : ''}
        `;
        li.addEventListener('click', () => openChat(chat.partnerId, chat.partnerName));
        list.appendChild(li);
      });
    }

    // 채팅 열기
    async function openChat(partnerId, partnerName) {
      currentPartnerId = partnerId;
      document.getElementById('chat-header').textContent = partnerName;
      document.getElementById('msg-input').disabled  = false;
      document.getElementById('send-btn').disabled   = false;

      const messages = await loadMessages(partnerId);
      const box = document.getElementById('messages');
      box.innerHTML = '';
      messages.forEach(appendMessage);
      box.scrollTop = box.scrollHeight;
    }

    // 메시지 렌더링
    function appendMessage(msg) {
      const box  = document.getElementById('messages');
      const div  = document.createElement('div');
      const isMe = msg.senderId === me?.id;
      div.className = `message ${isMe ? 'mine' : 'theirs'}`;
      div.textContent = msg.content;
      box.appendChild(div);
      box.scrollTop = box.scrollHeight;
    }

    // 메시지 전송
    document.getElementById('send-btn').addEventListener('click', () => {
      const input = document.getElementById('msg-input');
      const text  = input.value.trim();
      if (!text || !currentPartnerId) return;
      sendMessage(currentPartnerId, text);
      input.value = '';
    });

    // 엔터키 전송
    document.getElementById('msg-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('send-btn').click();
    });

    // 로그아웃
    document.getElementById('logout-btn').addEventListener('click', () => {
      clearAuth();
      window.location.href = '/index.html';
    });

    renderChatList();
  </script>
</body>
</html>
